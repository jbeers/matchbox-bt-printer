name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MATCHBOX_REBUILD_EMBEDDED_STUBS: "0"
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Setup CommandBox
        uses: Ortus-Solutions/setup-commandbox@main

      - name: Build App
        run: |
          box install production=true save=false

      - name: TEMP Fix Dependencies
        run: |
          # Rename and fix tspl module to compile with current matchbox
          mv modules/tspl/models/TSPLTemplate.bx modules/tspl/models/TSPLTemplate.bxs
          sed -i 's/class {/class TSPLTemplate {/' modules/tspl/models/TSPLTemplate.bxs
          sed -i 's/class {/class ModuleConfig {/' modules/tspl/ModuleConfig.bx
          sed -i 's/type *: /type = /g' modules/tspl/models/TSPLTemplate.bxs
          sed -i 's/message *: /message = /g' modules/tspl/models/TSPLTemplate.bxs
          sed -i 's/throw(/println(/g' modules/tspl/models/TSPLTemplate.bxs
          sed -i 's/\([a-zA-Z0-9._]*\) += /\1 = \1 + /g' modules/tspl/models/TSPLTemplate.bxs
          sed -i 's/\([a-zA-Z0-9._]*\) -= /\1 = \1 - /g' modules/tspl/models/TSPLTemplate.bxs
          sed -i 's/for ( var \([a-zA-Z0-9_]*\) in /for ( \1 in /g' modules/tspl/models/TSPLTemplate.bxs
          # Fix multiple-variable for loops
          sed -i 's/for ( var key, value in arguments.primary ) {/for ( key in arguments.primary ) { var value = arguments.primary[key];/g' modules/tspl/models/TSPLTemplate.bxs
          sed -i 's/for ( var key, value in arguments.secondary ) {/for ( key in arguments.secondary ) { var value = arguments.secondary[key];/g' modules/tspl/models/TSPLTemplate.bxs
          sed -i 's/for ( var key, value in arguments.step ) {/for ( key in arguments.step ) { var value = arguments.step[key];/g' modules/tspl/models/TSPLTemplate.bxs

      - name: Download MatchBox
        run: |
          curl -o matchbox https://github.com/ortus-boxlang/matchbox/releases/download/v0.6.0/matchbox-linux-x64
          chmod +x matchbox

      - name: Generate JS/WASM bundle
        run: |
          ./matchbox --target js app.bxs --output app.js

      - name: Prepare Pages artifact
        run: |
          mkdir -p dist
          cp index.html dist/
          cp logo.png dist/
          cp app.js dist/
          cp app.wasm dist/
          touch dist/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
