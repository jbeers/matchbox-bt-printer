<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoxLang Bluetooth Printer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { ready, registerComponent } from './app.js';

        // 1. Wait for BoxLang WASM VM to load
        await ready;

        // 2. Load Alpine module from ESM and assign to global
        const { default: Alpine } = await import('https://unpkg.com/alpinejs@3/dist/module.esm.js');
        window.Alpine = Alpine;

        // 3. Register the BoxLang component
        await registerComponent();
        
        // 4. Start Alpine
        Alpine.start();
    </script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="max-w-md w-full bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700"
         x-data="btprinter"
         x-cloak>
        
        <header class="mb-8 text-center">
            <div class="flex justify-center mb-4">
                <div class="p-4 bg-blue-500/10 rounded-full border border-blue-500/20">
                    <svg class="w-12 h-12 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0" />
                    </svg>
                </div>
            </div>
            <h1 class="text-3xl font-extrabold text-blue-400 tracking-tight">
                MatchBox <span class="text-white">Printer</span>
            </h1>
            <p class="text-slate-400 mt-2 text-sm italic">Bluetooth Thermal Printing via WASM</p>
        </header>

        <!-- Status Card -->
        <div class="bg-slate-950 rounded-2xl p-6 mb-8 border border-slate-700 shadow-inner">
            <div class="flex items-center justify-between mb-2">
                <span class="text-xs font-bold uppercase tracking-widest text-slate-500">Status</span>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full" 
                         :class="characteristic ? 'bg-green-500 animate-pulse' : (connection ? 'bg-yellow-500' : 'bg-red-500')"></div>
                    <span class="text-xs font-mono font-bold" 
                          :class="characteristic ? 'text-green-400' : 'text-slate-400'"
                          x-text="status"></span>
                </div>
            </div>
            
            <template x-if="device">
                <div class="mt-4 pt-4 border-t border-slate-800">
                    <p class="text-xs text-slate-500 uppercase font-bold mb-1">Connected Device</p>
                    <p class="text-lg font-bold text-white" x-text="device.name"></p>
                </div>
            </template>

            <template x-if="error">
                <div class="mt-4 p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-xs">
                    <p x-text="error"></p>
                </div>
            </template>
        </div>

        <!-- Controls -->
        <div class="space-y-4">
            <template x-if="!isSupported">
                <div class="p-4 bg-orange-500/10 border border-orange-500/20 rounded-2xl text-orange-300 text-sm text-center">
                    Web Bluetooth is not supported in this browser or environment.
                </div>
            </template>

            <template x-if="isSupported">
                <div class="flex flex-col gap-4">
                    <button 
                        @click="void (connection ? disconnect() : connect())"
                        class="w-full py-4 rounded-2xl font-bold transition-all active:scale-[0.98] shadow-lg flex items-center justify-center gap-3"
                        :class="connection ? 'bg-slate-700 hover:bg-slate-600 text-white border border-slate-600' : 'bg-blue-600 hover:bg-blue-500 text-white'"
                    >
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                        </svg>
                        <span x-text="connection ? 'Disconnect Printer' : 'Search for Printer'"></span>
                    </button>

                    <button 
                        @click="
                            const response = await fetch('./logo.png');
                            const arrayBuffer = await response.arrayBuffer();
                            const bytes = new Uint8Array(arrayBuffer);
                            await printHello(bytes);
                        "
                        :disabled="!characteristic"
                        class="w-full py-4 bg-green-600 hover:bg-green-500 disabled:bg-slate-800 disabled:opacity-30 disabled:cursor-not-allowed rounded-2xl font-bold transition-all active:scale-[0.98] shadow-lg text-white flex items-center justify-center gap-3"
                    >
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                        </svg>
                        Print Hello World
                    </button>
                </div>
            </template>
        </div>

        <footer class="mt-8 text-center">
            <p class="text-xs text-slate-500 font-medium uppercase tracking-widest">Built with BoxLang & MatchBox</p>
        </footer>

        <div id="output">
        
    </div>

    </div>

    

    <style>
        [x-cloak] { display: none !important; }
    </style>

</body>
</html>
